JWT_TOKEN="q1289629510"
JWT_TOKENGUEST_PASSWORD="q1289629510"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="[\"cjdy8.mobi\",\"cs123.mobi\",\"frryw.online\",\"gfkmn.online\",\"nrqld.online\"]"
